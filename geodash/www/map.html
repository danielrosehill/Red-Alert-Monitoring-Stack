<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Alert Geodash — Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .map-container {
            flex: 1;
            position: relative;
            min-height: 0;
        }

        #map-full {
            width: 100%;
            height: 100%;
        }

        .leaflet-container { background: #e8e8e8; }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 10px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.92);
            padding: 10px 14px;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
            color: #dde;
        }
        .legend-swatch {
            width: 18px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ── Alert Flash Bar ─────────────────────────────────── */
        .alert-flash-bar {
            background: #16213e;
            border-top: 2px solid #0f3460;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            min-height: 48px;
            overflow: hidden;
            white-space: nowrap;
            transition: background 0.3s, border-color 0.3s;
        }

        .alert-flash-bar.alert-active {
            background: #e94560;
            border-top-color: #ff2244;
            animation: flashbar-red 1s infinite;
        }

        .alert-flash-bar.warning-active {
            background: #ff9800;
            border-top-color: #ffb300;
            animation: flashbar-orange 1.2s infinite;
        }

        .alert-flash-bar.allclear-active {
            background: #1a3a2a;
            border-top-color: #4ecca3;
        }

        .flashbar-label {
            font-size: 0.85rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #7eddb8;
            flex-shrink: 0;
        }

        .alert-flash-bar.alert-active .flashbar-label,
        .alert-flash-bar.warning-active .flashbar-label {
            color: #fff;
            font-size: 1rem;
        }

        .alert-flash-bar.allclear-active .flashbar-label {
            color: #4ecca3;
        }

        .flashbar-text {
            font-size: 1rem;
            font-weight: 700;
            color: #889;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .alert-flash-bar.alert-active .flashbar-text,
        .alert-flash-bar.warning-active .flashbar-text {
            color: #fff;
            font-size: 1.1rem;
        }

        .alert-flash-bar.allclear-active .flashbar-text {
            color: #7eddb8;
        }

        .flashbar-count {
            font-size: 0.9rem;
            font-weight: 800;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 3px 12px;
            border-radius: 12px;
            flex-shrink: 0;
            display: none;
            white-space: nowrap;
        }

        .alert-flash-bar.alert-active .flashbar-count,
        .alert-flash-bar.warning-active .flashbar-count {
            display: inline-block;
        }

        @keyframes flashbar-red {
            0%, 100% { background: #e94560; }
            50% { background: #c0243a; }
        }

        @keyframes flashbar-orange {
            0%, 100% { background: #ff9800; }
            50% { background: #e07800; }
        }
    </style>
</head>
<body>
    <div id="geodash-header"></div>

    <div class="map-container">
        <div id="map-full"></div>
    </div>

    <div class="alert-flash-bar" id="alert-flash-bar">
        <span class="flashbar-label" id="flashbar-label">LIVE</span>
        <span class="flashbar-text" id="flashbar-text">No active alerts</span>
        <span class="flashbar-count" id="flashbar-count"></span>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/components.js?v=14"></script>
    <script>renderHeader('map'); renderFooter();</script>
    <script src="/static/map.js?v=1"></script>
</body>
</html>
