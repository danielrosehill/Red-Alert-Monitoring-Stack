<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Alert Dashboard — Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-box {
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 40px;
            width: 340px;
            text-align: center;
        }
        .login-box h1 {
            font-size: 1.3rem;
            color: #e94560;
            margin-bottom: 8px;
        }
        .login-box p {
            color: #888;
            font-size: 0.85rem;
            margin-bottom: 24px;
        }
        #code-input {
            width: 100%;
            padding: 14px;
            text-align: center;
            font-size: 1.5rem;
            font-weight: bold;
            letter-spacing: 8px;
            background: #1a1a2e;
            border: 2px solid #0f3460;
            border-radius: 8px;
            color: #eee;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }
        #code-input:focus {
            border-color: #e94560;
        }
        #code-input.error {
            border-color: #e94560;
            animation: shake 0.3s;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-6px); }
            75% { transform: translateX(6px); }
        }
        #login-btn {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        #login-btn:hover { background: #d63851; }
        #login-btn:disabled {
            background: #555;
            cursor: not-allowed;
        }
        #error-msg {
            color: #e94560;
            font-size: 0.8rem;
            margin-top: 12px;
            min-height: 20px;
        }
        #lockout-msg {
            color: #ff9800;
            font-size: 0.85rem;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>Red Alert Dashboard</h1>
        <p>Enter access code</p>
        <input type="password" id="code-input" maxlength="4" inputmode="numeric" pattern="[0-9]*" autocomplete="off" placeholder="----">
        <button id="login-btn">Enter</button>
        <div id="error-msg"></div>
        <div id="lockout-msg"></div>
    </div>
    <script>
        const codeInput = document.getElementById('code-input');
        const loginBtn = document.getElementById('login-btn');
        const errorMsg = document.getElementById('error-msg');
        const lockoutMsg = document.getElementById('lockout-msg');

        // Check if already authenticated
        fetch('/api/check-auth').then(r => {
            if (r.ok) window.location.href = '/dashboard.html';
        });

        codeInput.focus();

        codeInput.addEventListener('input', () => {
            codeInput.value = codeInput.value.replace(/[^0-9]/g, '');
        });

        codeInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') doLogin();
        });

        loginBtn.addEventListener('click', doLogin);

        async function doLogin() {
            const code = codeInput.value;
            if (code.length !== 4) {
                errorMsg.textContent = 'Enter 4-digit code';
                return;
            }

            loginBtn.disabled = true;
            errorMsg.textContent = '';
            lockoutMsg.textContent = '';

            try {
                const resp = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code }),
                });
                const data = await resp.json();

                if (resp.ok) {
                    window.location.href = '/dashboard.html';
                    return;
                }

                if (resp.status === 429) {
                    const mins = Math.ceil(data.retry_after / 60);
                    lockoutMsg.textContent = `Too many attempts. Try again in ${mins} minute${mins > 1 ? 's' : ''}.`;
                    codeInput.value = '';
                    codeInput.disabled = true;
                    loginBtn.disabled = true;
                    setTimeout(() => {
                        codeInput.disabled = false;
                        loginBtn.disabled = false;
                        lockoutMsg.textContent = '';
                        codeInput.focus();
                    }, data.retry_after * 1000);
                } else {
                    errorMsg.textContent = data.attempts_remaining > 0
                        ? `Invalid code. ${data.attempts_remaining} attempt${data.attempts_remaining !== 1 ? 's' : ''} remaining.`
                        : 'Invalid code.';
                    codeInput.value = '';
                    codeInput.classList.add('error');
                    setTimeout(() => codeInput.classList.remove('error'), 500);
                    codeInput.focus();
                }
            } catch (err) {
                errorMsg.textContent = 'Connection error. Try again.';
            }

            loginBtn.disabled = false;
        }
    </script>
</body>
</html>
