<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Alert Geodash</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: auto;
        }

        /* ── Main Content ────────────────────────────────────── */
        .main-content {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* Maps area */
        .maps-area {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .maps-grid {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        .map-column {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
        }

        .map-column + .map-column {
            border-left: 2px solid #0f3460;
        }

        .map-card {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            min-height: 0;
        }

        .map-card + .map-card {
            border-top: 2px solid #0f3460;
        }

        .map-label {
            position: absolute;
            top: 12px;
            left: 12px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.92);
            padding: clamp(6px, 0.6vh, 14px) clamp(16px, 1.2vw, 28px);
            border-radius: 6px;
            font-size: clamp(1rem, 1.1vw, 1.6rem);
            font-weight: 600;
            color: #eef;
            pointer-events: none;
        }

        .map-wrap {
            flex: 1;
            min-height: 0;
        }
        .map-wrap > div {
            width: 100%;
            height: 100%;
        }

        /* ── Alert Flash Bar ─────────────────────────────────── */
        .alert-flash-bar {
            background: #16213e;
            border-top: 2px solid #0f3460;
            padding: clamp(10px, 1vh, 20px) clamp(20px, 1.5vw, 40px);
            display: flex;
            align-items: center;
            gap: clamp(16px, 1.2vw, 28px);
            flex-shrink: 0;
            min-height: clamp(48px, 5vh, 80px);
            overflow: hidden;
            white-space: nowrap;
            transition: background 0.3s, border-color 0.3s;
        }

        .alert-flash-bar.alert-active {
            background: #e94560;
            border-top-color: #ff2244;
            animation: flashbar-red 1s infinite;
        }

        .alert-flash-bar.warning-active {
            background: #e65100;
            border-top-color: #ffb300;
            animation: flashbar-orange 1.2s infinite;
        }

        .alert-flash-bar.allclear-active {
            background: #1a3a2a;
            border-top-color: #4ecca3;
        }

        .flashbar-label {
            font-size: clamp(0.85rem, 1vw, 1.5rem);
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #7eddb8;
            flex-shrink: 0;
        }

        .alert-flash-bar.alert-active .flashbar-label {
            color: #fff;
            font-size: clamp(1rem, 1.2vw, 1.8rem);
        }

        .alert-flash-bar.warning-active .flashbar-label {
            color: #fff;
            font-size: clamp(1rem, 1.2vw, 1.8rem);
        }

        .alert-flash-bar.allclear-active .flashbar-label {
            color: #4ecca3;
        }

        .flashbar-text {
            font-size: clamp(1rem, 1.1vw, 1.7rem);
            font-weight: 700;
            color: #889;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .alert-flash-bar.alert-active .flashbar-text {
            color: #fff;
            font-size: clamp(1.1rem, 1.3vw, 2rem);
        }

        .alert-flash-bar.warning-active .flashbar-text {
            color: #fff;
            font-size: clamp(1.1rem, 1.3vw, 2rem);
        }

        .alert-flash-bar.allclear-active .flashbar-text {
            color: #7eddb8;
        }

        .flashbar-count {
            font-size: 0.9rem;
            font-weight: 800;
            color: #fff;
            background: rgba(0,0,0,0.3);
            padding: 3px 12px;
            border-radius: 12px;
            flex-shrink: 0;
            display: none;
            white-space: nowrap;
        }

        .alert-flash-bar.alert-active .flashbar-count,
        .alert-flash-bar.warning-active .flashbar-count {
            display: inline-block;
        }

        @keyframes flashbar-red {
            0%, 100% { background: #e94560; }
            50% { background: #c0243a; }
        }

        @keyframes flashbar-orange {
            0%, 100% { background: #e65100; }
            50% { background: #e07800; }
        }

        .severity-indicator {
            font-size: clamp(0.8rem, 0.9vw, 1.3rem);
            font-weight: 700;
            color: #7eddb8;
            border: 1px solid #7eddb8;
            padding: clamp(3px, 0.3vh, 8px) clamp(12px, 1vw, 20px);
            border-radius: 12px;
            flex-shrink: 0;
            white-space: nowrap;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .test-alert-group {
            display: flex;
            gap: 4px;
            margin-left: auto;
            flex-shrink: 0;
        }
        .test-alert-btn {
            background: #0f3460;
            border: 1px solid #2a4a80;
            color: #aab;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 700;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            flex-shrink: 0;
            transition: all 0.2s;
        }
        .test-alert-btn.test-red:hover {
            color: #fff;
            border-color: #e94560;
            background: #e94560;
        }
        .test-alert-btn.test-warning:hover {
            color: #fff;
            border-color: #e65100;
            background: #e65100;
        }
        .test-alert-btn.test-allclear:hover {
            color: #fff;
            border-color: #4ecca3;
            background: #2a6b55;
        }
        .test-alert-btn.test-clear {
            border-color: #889;
        }
        .test-alert-btn.test-clear:hover {
            color: #fff;
            border-color: #fff;
            background: #555;
        }

        /* ── News Ticker ────────────────────────────────────── */
        .news-ticker {
            background: #0d1a33;
            border-top: 1px solid #0f3460;
            padding: clamp(6px, 0.6vh, 14px) clamp(20px, 1.5vw, 40px);
            display: flex;
            align-items: center;
            gap: clamp(12px, 1vw, 24px);
            flex-shrink: 0;
            min-height: clamp(36px, 4vh, 60px);
            overflow: hidden;
        }

        .ticker-label {
            font-size: clamp(0.7rem, 0.8vw, 1.1rem);
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #4a7ab5;
            flex-shrink: 0;
        }

        .ticker-item {
            flex: 1;
            display: flex;
            align-items: center;
            gap: clamp(10px, 0.8vw, 18px);
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.8s ease-in-out;
        }

        .ticker-item.visible {
            opacity: 1;
        }

        .ticker-headline {
            font-size: clamp(0.85rem, 1vw, 1.5rem);
            font-weight: 600;
            color: #ccd;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
        }

        .ticker-headline a {
            color: inherit;
            text-decoration: none;
        }
        .ticker-headline a:hover {
            color: #7eddb8;
        }

        .ticker-source {
            font-size: clamp(0.65rem, 0.75vw, 1rem);
            font-weight: 700;
            padding: clamp(2px, 0.2vh, 5px) clamp(8px, 0.6vw, 14px);
            border-radius: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex-shrink: 0;
            white-space: nowrap;
        }

        .ticker-source.toi {
            background: #1a3a6e;
            color: #7ab8e8;
        }

        .ticker-source.jns {
            background: #3a1a4e;
            color: #b87ae8;
        }

        .ticker-source.other {
            background: #2a3a2a;
            color: #8ab88a;
        }

        .ticker-time {
            font-size: clamp(0.7rem, 0.8vw, 1.1rem);
            color: #667;
            flex-shrink: 0;
            white-space: nowrap;
            font-variant-numeric: tabular-nums;
        }

        .leaflet-container { background: #e8e8e8; }

        .legend {
            position: absolute;
            bottom: 20px;
            left: 10px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.92);
            padding: clamp(10px, 1vh, 18px) clamp(14px, 1vw, 24px);
            border-radius: 6px;
            font-size: clamp(0.85rem, 0.95vw, 1.3rem);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
            color: #dde;
        }
        .legend-swatch {
            width: 18px;
            height: 12px;
            border-radius: 2px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* ── Sidebar ─────────────────────────────────────────── */
        .sidebar {
            width: clamp(320px, 22vw, 520px);
            min-width: 320px;
            background: #16213e;
            border-left: 2px solid #0f3460;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .sidebar-section {
            padding: clamp(14px, 1.2vh, 24px) clamp(16px, 1.2vw, 28px);
            border-bottom: 1px solid #0f3460;
        }

        .sidebar-section h3 {
            font-size: clamp(0.8rem, 0.9vw, 1.3rem);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7eddb8;
            margin-bottom: 10px;
            font-weight: 700;
        }

        /* Monitoring area selector */
        .area-selector {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .area-selector label {
            padding: clamp(5px, 0.5vh, 10px) clamp(12px, 1vw, 20px);
            border-radius: 4px;
            font-size: clamp(0.8rem, 0.9vw, 1.2rem);
            font-weight: 600;
            cursor: pointer;
            color: #bbc;
            background: #0f3460;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .area-selector label:hover { color: #eee; }
        .area-selector input[type="radio"] { display: none; }
        .area-selector input[type="radio"]:checked + label {
            background: #7eddb8;
            color: #1a1a2e;
        }

        .monitoring-area-name {
            margin-top: 8px;
            font-size: clamp(1.1rem, 1.2vw, 1.8rem);
            font-weight: 700;
            color: #eef;
            padding: 6px 0;
        }

        .monitoring-status {
            margin-top: 4px;
            font-size: clamp(1.1rem, 1.2vw, 1.8rem);
            font-weight: 700;
            color: #7eddb8;
        }

        /* motto handled by geodash-footer component */

        /* Alert history feed */
        .alert-feed {
            flex: 1;
            overflow-y: auto;
            padding: 0 16px 14px;
        }

        .alert-feed-header {
            padding: 14px 16px 8px;
        }

        .alert-feed-header h3 {
            font-size: clamp(0.8rem, 0.9vw, 1.3rem);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #7eddb8;
            font-weight: 700;
        }

        .alert-item {
            padding: clamp(6px, 0.6vh, 14px) clamp(10px, 0.8vw, 18px);
            margin-bottom: clamp(2px, 0.3vh, 6px);
            border-radius: 4px;
            background: rgba(15, 52, 96, 0.5);
            font-size: clamp(0.8rem, 0.9vw, 1.3rem);
            line-height: 1.3;
            display: grid;
            grid-template-columns: auto 1fr;
            grid-template-rows: auto auto;
            column-gap: 8px;
            row-gap: 1px;
        }

        .alert-item .alert-time {
            color: #dde;
            font-size: clamp(0.78rem, 0.85vw, 1.2rem);
            font-variant-numeric: tabular-nums;
            grid-row: 1;
            grid-column: 1;
        }

        .alert-item .alert-type {
            color: #e94560;
            font-size: clamp(0.72rem, 0.8vw, 1.1rem);
            font-weight: 700;
            grid-row: 1;
            grid-column: 2;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .alert-item .alert-type::before {
            content: '';
            display: inline-block;
            width: clamp(8px, 0.6vw, 12px);
            height: clamp(8px, 0.6vw, 12px);
            border-radius: 50%;
            background: #e94560;
            flex-shrink: 0;
        }

        .alert-item .alert-type.cat-13::before {
            background: #7eddb8;
        }

        .alert-item .alert-type.cat-14::before {
            background: #e65100;
        }

        .alert-item .alert-area {
            color: #eef;
            font-weight: 600;
            grid-row: 2;
            grid-column: 1 / -1;
            font-size: clamp(0.82rem, 0.95vw, 1.35rem);
        }

        .alert-item .alert-region {
            color: #8899aa;
            font-weight: 400;
            font-size: 0.85em;
        }

        .alert-item .alert-type.cat-13 { color: #7eddb8; }
        .alert-item .alert-type.cat-14 { color: #e65100; }

        .alert-feed .no-alerts {
            color: #667;
            font-style: italic;
            padding: 20px 0;
            text-align: center;
        }

        .sidebar-footer {
            padding: 8px 16px;
            border-top: 1px solid #0f3460;
            font-size: 0.7rem;
            color: #556;
            text-align: center;
        }

        /* Scrollbar styling */
        .alert-feed::-webkit-scrollbar { width: 6px; }
        .alert-feed::-webkit-scrollbar-track { background: transparent; }
        .alert-feed::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 3px; }

        /* ── Local alert overlay ─────────────────────────────── */
        #local-alert-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 9999;
            pointer-events: none;
            justify-content: center;
            align-items: center;
        }
        #local-alert-overlay.active-red,
        #local-alert-overlay.active-warning,
        #local-alert-overlay.active-allclear {
            display: flex;
            pointer-events: auto;
        }
        #local-alert-overlay.active-red {
            animation: flash-red 0.5s infinite;
        }
        #local-alert-overlay.active-warning {
            animation: flash-orange 0.8s infinite;
        }
        #local-alert-overlay.active-allclear {
            background: rgba(78, 204, 163, 0.15);
        }
        #local-alert-text {
            font-size: 3rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            padding: 30px 60px;
            border-radius: 16px;
            text-shadow: 0 0 20px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }
        #local-alert-overlay.active-red #local-alert-text {
            color: #fff;
            background: rgba(233, 69, 96, 0.85);
            box-shadow: 0 0 60px rgba(233, 69, 96, 0.6);
        }
        #local-alert-overlay.active-warning #local-alert-text {
            color: #fff;
            background: rgba(255, 152, 0, 0.85);
            box-shadow: 0 0 60px rgba(255, 152, 0, 0.6);
        }
        #local-alert-overlay.active-allclear #local-alert-text {
            color: #fff;
            background: rgba(78, 204, 163, 0.85);
            box-shadow: 0 0 60px rgba(78, 204, 163, 0.6);
        }

        #local-alert-dismiss {
            position: absolute;
            top: 24px;
            right: 32px;
            background: rgba(0,0,0,0.5);
            color: #fff;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 50%;
            width: 48px;
            height: 48px;
            font-size: 1.5rem;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            z-index: 10000;
        }
        #local-alert-dismiss:hover {
            background: rgba(0,0,0,0.8);
            border-color: #fff;
        }
        #local-alert-overlay.active-red #local-alert-dismiss,
        #local-alert-overlay.active-warning #local-alert-dismiss,
        #local-alert-overlay.active-allclear #local-alert-dismiss {
            display: flex;
        }

        @keyframes flash-red {
            0%, 100% { background: rgba(233, 69, 96, 0.15); }
            50% { background: rgba(233, 69, 96, 0.35); }
        }
        @keyframes flash-orange {
            0%, 100% { background: rgba(255, 152, 0, 0.1); }
            50% { background: rgba(255, 152, 0, 0.25); }
        }
    </style>
</head>
<body>
    <div id="geodash-header"></div>

    <div class="main-content">
        <div class="maps-area">
            <div class="maps-grid">
                <!-- Left: Israel Country View -->
                <div class="map-column">
                    <div class="map-card">
                        <div class="map-label">Israel — Country View</div>
                        <div class="map-wrap"><div id="map-country"></div></div>
                    </div>
                </div>
                <!-- Right: Jerusalem split 50/50 -->
                <div class="map-column">
                    <div class="map-card">
                        <div class="map-label">Jerusalem & Surroundings</div>
                        <div class="map-wrap"><div id="map-jerusalem-wide"></div></div>
                    </div>
                    <div class="map-card">
                        <div class="map-label">Jerusalem — City Detail</div>
                        <div class="map-wrap"><div id="map-jerusalem"></div></div>
                    </div>
                </div>
            </div>
            <!-- News ticker -->
            <div class="news-ticker" id="news-ticker">
                <span class="ticker-label">NEWS</span>
                <div class="ticker-item" id="ticker-item">
                    <span class="ticker-headline" id="ticker-headline">Loading...</span>
                </div>
            </div>
            <!-- Alert flash bar -->
            <div class="alert-flash-bar" id="alert-flash-bar">
                <span class="flashbar-label" id="flashbar-label">LIVE</span>
                <span class="flashbar-text" id="flashbar-text">No active alerts</span>
                <span class="flashbar-count" id="flashbar-count"></span>
                <span class="severity-indicator" id="severity-indicator" style="display:none">Severity: No Active Threats (0)</span>
                <div class="test-alert-group" id="test-alert-group">
                    <button class="test-alert-btn test-red" id="test-red-btn" title="Test red alert (rockets/missiles)">Test Red</button>
                    <button class="test-alert-btn test-warning" id="test-warning-btn" title="Test early warning / pre-warning">Test Warning</button>
                    <button class="test-alert-btn test-allclear" id="test-allclear-btn" title="Test all-clear notification">Test All Clear</button>
                    <button class="test-alert-btn test-clear" id="test-clear-btn" title="Clear all test alerts" style="display:none">Clear Tests</button>
                </div>
            </div>
        </div>

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>Monitoring Area</h3>
                <div class="monitoring-area-name" id="monitoring-area-name">Jerusalem — Center</div>
                <div class="area-selector" id="area-selector"></div>
                <div class="monitoring-status" id="monitoring-status">All clear</div>
            </div>
            <div class="alert-feed-header">
                <h3>Recent Alerts</h3>
            </div>
            <div class="alert-feed" id="alert-feed">
                <div class="no-alerts">No recent alerts</div>
            </div>
            <div id="geodash-footer"></div>
        </aside>
    </div>

    <!-- Full-screen alert overlay for local area -->
    <div id="local-alert-overlay">
        <div id="local-alert-text"></div>
        <button id="local-alert-dismiss" title="Dismiss alert (Esc key also works)" aria-label="Dismiss alert">✕</button>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/components.js?v=14"></script>
    <script>renderHeader('live'); renderFooter();</script>
    <script src="/static/dashboard.js?v=22"></script>
</body>
</html>
