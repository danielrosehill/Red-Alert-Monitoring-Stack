<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Red Alert Dashboard — TV</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
            background: #1a1a2e;
            color: #eee;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        #tv-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 64px;
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: space-between;
            justify-content: space-between;
            padding: 0 24px;
            background: #16213e;
            border-bottom: 3px solid #0f3460;
            z-index: 100;
        }

        .header-left {
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            gap: 24px;
        }

        header h1 {
            font-size: 1.8rem;
            color: #4ecca3;
        }

        .clocks {
            display: -webkit-flex;
            display: flex;
            gap: 30px;
            -webkit-align-items: center;
            align-items: center;
        }

        .clock-block {
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: baseline;
            align-items: baseline;
            gap: 8px;
        }

        .clock-label {
            color: #888;
            font-size: 1rem;
            text-transform: uppercase;
        }

        .clock-time {
            color: #4ecca3;
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .clock-block:last-child .clock-label {
            color: #2a7a4a;
        }

        .clock-block:last-child .clock-time {
            color: #3a9a5a;
            font-size: 1.6rem;
            font-weight: 500;
        }

        #status-bar {
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            gap: 16px;
            font-size: 1.1rem;
        }

        #status-indicator {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: #4ecca3;
        }

        #status-indicator.error { background: #e94560; }

        .view-switch {
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            gap: 10px;
            background: none;
            border: 2px solid #0f3460;
            color: #888;
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 1.2rem;
            cursor: pointer;
            text-decoration: none;
        }
        .view-switch svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
        }

        #alert-count {
            background: #e94560;
            color: white;
            padding: 4px 16px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            display: none;
        }

        #alert-count.active { display: inline-block; }

        #map-jerusalem {
            position: absolute;
            top: 67px;
            left: 0;
            right: 0;
            bottom: 120px;
        }

        .map-label {
            position: absolute;
            top: 80px;
            right: 16px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.9);
            padding: 8px 20px;
            border-radius: 8px;
            font-size: 1.1rem;
            pointer-events: none;
        }

        .ticker-bar {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 70px;
            height: 40px;
            line-height: 40px;
            background: rgba(22, 33, 62, 0.95);
            border-top: 2px solid #0f3460;
            padding: 0 16px;
            font-size: 1.1rem;
            color: #eee;
            white-space: nowrap;
            overflow: hidden;
            z-index: 1000;
        }

        .ticker-bar .ticker-text {
            display: inline-block;
        }

        .ticker-bar .ticker-text.scrolling {
            -webkit-animation: scroll-left 20s linear infinite;
            animation: scroll-left 20s linear infinite;
        }

        @-webkit-keyframes scroll-left {
            0% { -webkit-transform: translateX(100%); transform: translateX(100%); }
            100% { -webkit-transform: translateX(-100%); transform: translateX(-100%); }
        }

        @keyframes scroll-left {
            0% { -webkit-transform: translateX(100%); transform: translateX(100%); }
            100% { -webkit-transform: translateX(-100%); transform: translateX(-100%); }
        }

        .monitoring-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: #16213e;
            border-top: 3px solid #0f3460;
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            -webkit-justify-content: center;
            justify-content: center;
            padding: 0 24px;
            gap: 20px;
        }

        .monitoring-label {
            font-size: 1.5rem;
            font-weight: 700;
            color: #4ecca3;
        }

        .monitoring-area {
            font-size: 1.5rem;
            font-weight: 600;
            color: #eee;
            background: rgba(78, 204, 163, 0.1);
            padding: 6px 20px;
            border-radius: 8px;
            border: 1px solid rgba(78, 204, 163, 0.3);
        }

        .monitoring-status {
            font-size: 1.2rem;
            color: #4ecca3;
        }

        .version-label {
            position: absolute;
            right: 24px;
            font-size: 0.8rem;
            color: #555;
        }

        .leaflet-container { background: #e8e8e8; }

        .legend {
            position: absolute;
            bottom: 20px;
            right: 16px;
            z-index: 1000;
            background: rgba(22, 33, 62, 0.9);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 1rem;
        }

        .legend-item {
            display: -webkit-flex;
            display: flex;
            -webkit-align-items: center;
            align-items: center;
            gap: 8px;
            margin: 5px 0;
        }

        .legend-swatch {
            width: 20px;
            height: 14px;
            border-radius: 3px;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Local alert overlay */
        #local-alert-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
        }

        #local-alert-overlay.active-red {
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-animation: flash-red 0.5s infinite;
            animation: flash-red 0.5s infinite;
        }

        #local-alert-overlay.active-warning {
            display: -webkit-flex;
            display: flex;
            -webkit-justify-content: center;
            justify-content: center;
            -webkit-align-items: center;
            align-items: center;
            -webkit-animation: flash-orange 0.8s infinite;
            animation: flash-orange 0.8s infinite;
        }

        #local-alert-text {
            font-size: 4rem;
            font-weight: 900;
            text-align: center;
            text-transform: uppercase;
            padding: 40px 80px;
            border-radius: 20px;
            letter-spacing: 3px;
        }

        #local-alert-overlay.active-red #local-alert-text {
            color: #fff;
            background: rgba(233, 69, 96, 0.85);
        }

        #local-alert-overlay.active-warning #local-alert-text {
            color: #fff;
            background: rgba(255, 152, 0, 0.85);
        }

        @-webkit-keyframes flash-red {
            0%, 100% { background: rgba(233, 69, 96, 0.15); }
            50% { background: rgba(233, 69, 96, 0.35); }
        }
        @keyframes flash-red {
            0%, 100% { background: rgba(233, 69, 96, 0.15); }
            50% { background: rgba(233, 69, 96, 0.35); }
        }

        @-webkit-keyframes flash-orange {
            0%, 100% { background: rgba(255, 152, 0, 0.1); }
            50% { background: rgba(255, 152, 0, 0.25); }
        }
        @keyframes flash-orange {
            0%, 100% { background: rgba(255, 152, 0, 0.1); }
            50% { background: rgba(255, 152, 0, 0.25); }
        }
    </style>
</head>
<body>
    <div id="tv-wrapper">
        <header>
            <div class="header-left">
                <h1>Red Alert</h1>
                <div class="clocks">
                    <div class="clock-block">
                        <span class="clock-label">Israel</span>
                        <span class="clock-time" id="clock-local">--:--</span>
                    </div>
                    <div class="clock-block">
                        <span class="clock-label">UTC</span>
                        <span class="clock-time" id="clock-utc">--:--</span>
                    </div>
                </div>
            </div>
            <div id="status-bar">
                <span id="alert-count"></span>
                <div id="status-indicator"></div>
                <a href="/" class="view-switch" title="Switch to Web view">
                    <svg viewBox="0 0 24 24"><path d="M20 18c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2H4c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2H0v2h24v-2h-4zM4 6h16v10H4V6z"/></svg>
                    Web
                </a>
                <a href="/tablet" class="view-switch" title="Switch to Tablet view">
                    <svg viewBox="0 0 24 24"><path d="M18.5 0h-14A2.5 2.5 0 0 0 2 2.5v19A2.5 2.5 0 0 0 4.5 24h14a2.5 2.5 0 0 0 2.5-2.5v-19A2.5 2.5 0 0 0 18.5 0zm-7 23c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zm7.5-4H4V3h15v16z"/></svg>
                    Tablet
                </a>
            </div>
        </header>

        <div id="map-jerusalem"></div>
        <div class="map-label">Jerusalem & Surroundings</div>

        <div class="ticker-bar">
            <span class="ticker-text" id="ticker-text">No alerts</span>
        </div>

        <div class="monitoring-bar">
            <span class="monitoring-label">MONITORING:</span>
            <span class="monitoring-area" id="alert-area-display"></span>
            <span class="monitoring-status" id="monitoring-status">All clear</span>
            <span class="version-label">v1.2.0 TV</span>
        </div>
    </div>

    <div id="local-alert-overlay">
        <div id="local-alert-text"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/static/tv.js"></script>
</body>
</html>
