<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts + News — Red Alert Geodash</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header/nav/clocks handled by components.js */

        .main-content {
            display: flex;
            flex: 1;
            min-height: 0;
        }

        /* Left: Alerts */
        .alerts-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            border-right: 2px solid #0f3460;
        }

        .panel-header {
            background: #16213e;
            padding: 10px 16px;
            font-size: 0.85rem;
            font-weight: 700;
            color: #7eddb8;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .panel-header .count {
            color: #aab;
            font-weight: 400;
            font-size: 0.75rem;
        }

        .alert-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px;
        }

        .alert-list::-webkit-scrollbar { width: 4px; }
        .alert-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

        .alert-entry {
            padding: 8px 12px;
            margin-bottom: 2px;
            border-radius: 4px;
            background: rgba(15, 52, 96, 0.5);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .alert-entry-time {
            color: #dde;
            font-size: 0.78rem;
            font-variant-numeric: tabular-nums;
            flex-shrink: 0;
            min-width: 80px;
        }

        .alert-entry-cat {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .alert-entry-area {
            font-weight: 600;
            font-size: 0.85rem;
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .alert-entry-type {
            font-size: 0.75rem;
            color: #bbc;
            flex-shrink: 0;
        }

        /* Right: News */
        .news-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .news-list {
            flex: 1;
            overflow-y: auto;
            padding: 4px;
        }

        .news-list::-webkit-scrollbar { width: 4px; }
        .news-list::-webkit-scrollbar-thumb { background: #0f3460; border-radius: 2px; }

        .news-entry {
            padding: 10px 14px;
            margin-bottom: 2px;
            border-radius: 4px;
            background: rgba(15, 52, 96, 0.5);
            transition: background 0.15s;
        }

        .news-entry:hover { background: rgba(15, 52, 96, 0.8); }

        .news-entry a {
            color: #fff;
            text-decoration: none;
            font-size: 0.9rem;
            line-height: 1.4;
            font-weight: 500;
        }

        .news-entry a:hover { text-decoration: underline; }

        .news-meta {
            display: flex;
            gap: 10px;
            align-items: center;
            margin-top: 6px;
        }

        .news-time {
            color: #889;
            font-size: 0.72rem;
        }

        .news-source {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 10px;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .news-source.toi {
            background: #1a3a6e;
            color: #7eddb8;
            border: 1px solid #7eddb8;
        }

        .news-source.jns {
            background: #3a1a2e;
            color: #ff9800;
            border: 1px solid #ff9800;
        }

        .news-source.other {
            background: #2a2a3e;
            color: #ccd;
            border: 1px solid #556;
        }

        .no-data {
            color: #667;
            font-style: italic;
            padding: 20px;
            text-align: center;
        }

        .stream-bar {
            padding: 6px 8px;
            background: #16213e;
            border-bottom: 1px solid #0f3460;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: background 0.2s;
        }
        .stream-bar:hover { background: #1a3a5e; }
        .stream-bar-badge {
            background: #e94560;
            color: #fff;
            font-size: 0.6rem;
            font-weight: 800;
            padding: 1px 6px;
            border-radius: 3px;
            letter-spacing: 1px;
        }
        .stream-bar-label {
            font-size: 0.75rem;
            color: #dde;
        }
        .stream-panel {
            display: none;
            flex-shrink: 0;
            background: #000;
        }
        .stream-panel.active { display: block; }
        .stream-panel iframe {
            width: 100%;
            height: 250px;
            border: none;
        }

        .flash-bar {
            background: #16213e;
            border-top: 2px solid #0f3460;
            padding: 6px 16px;
            display: flex;
            align-items: center;
            gap: 16px;
            flex-shrink: 0;
            min-height: 36px;
        }

        .flash-bar.active { background: #e94560; animation: flash 1s infinite; }

        .flash-bar-label {
            font-size: 0.8rem;
            font-weight: 800;
            color: #7eddb8;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .flash-bar.active .flash-bar-label { color: #fff; }

        .flash-bar-text {
            font-size: 0.9rem;
            color: #889;
            flex: 1;
        }

        .flash-bar.active .flash-bar-text { color: #fff; font-weight: 700; }

        @keyframes flash {
            0%, 100% { background: #e94560; }
            50% { background: #c0243a; }
        }
    </style>
</head>
<body>
    <div id="geodash-header"></div>

    <div class="main-content">
        <div class="alerts-panel">
            <div class="panel-header">
                Recent Alerts (3 days)
                <span class="count" id="alert-count"></span>
            </div>
            <div class="alert-list" id="alert-list">
                <div class="no-data">Loading alerts...</div>
            </div>
        </div>
        <div class="news-panel">
            <div class="panel-header">
                News
                <span class="count" id="news-count"></span>
            </div>
            <div class="stream-bar" id="stream-toggle">
                <span class="stream-bar-badge">LIVE</span>
                <span class="stream-bar-label" id="stream-label">i24NEWS — play</span>
            </div>
            <div class="stream-panel" id="stream-panel"></div>
            <div class="news-list" id="news-list">
                <div class="no-data">Loading news...</div>
            </div>
        </div>
    </div>

    <div class="flash-bar" id="flash-bar">
        <span class="flash-bar-label">LIVE</span>
        <span class="flash-bar-text" id="flash-bar-text">Monitoring...</span>
    </div>

    <div id="geodash-footer"></div>

    <script src="/static/components.js?v=14"></script>
    <script>renderHeader('alerts-news'); renderFooter();</script>
    <script>
        // ── Config ──
        const CATEGORY_COLORS = {
            1: "#e94560", 2: "#e94560", 3: "#e94560", 4: "#e94560",
            6: "#e94560",
            7: "#e94560", 8: "#e94560", 9: "#e94560", 10: "#e94560",
            11: "#e94560", 12: "#e94560",
            14: "#ff9800",
            13: "#4ecca3",
        };

        const TITLE_TRANSLATIONS = {
            "ירי רקטות וטילים": "Rockets",
            "חדירת כלי טיס עוין": "UAV",
            "חדירת כלי טיס": "Aircraft Intrusion",
            "חדירת מחבלים": "Terrorist Infiltration",
            "רעידת אדמה": "Earthquake",
            "צונאמי": "Tsunami",
            "חומרים מסוכנים": "Hazardous Materials",
            "אירוע רדיולוגי": "Radiological Event",
            "התרעת קדם": "Pre-Warning",
            "ירי רקטות": "Rocket Fire",
            "טיל בליסטי": "Ballistic Missile",
            "כלי טיס עוין": "UAV",
            "היכנסו למרחב המוגן": "Enter Protected Space",
            "האירוע הסתיים": "All Clear",
        };

        let areaTranslations = {};

        function translateArea(name) {
            return areaTranslations[name] || name;
        }

        function translateTitle(title) {
            if (!title) return '';
            if (TITLE_TRANSLATIONS[title]) return TITLE_TRANSLATIONS[title];
            for (const [he, en] of Object.entries(TITLE_TRANSLATIONS)) {
                if (title.includes(he)) return en;
            }
            return title;
        }

        function getSourceClass(source) {
            if (!source) return 'other';
            const s = source.toLowerCase();
            if (s.includes('times of israel') || s.includes('toi')) return 'toi';
            if (s.includes('jns')) return 'jns';
            return 'other';
        }

        function getSourceLabel(source) {
            if (!source) return '';
            const s = source.toLowerCase();
            if (s.includes('times of israel')) return 'TOI';
            if (s.includes('jns')) return 'JNS';
            return source;
        }

        // ── Load Alerts ──
        async function loadAlerts() {
            try {
                const [transResp, alertResp] = await Promise.all([
                    fetch('/api/translations'),
                    fetch('/api/alert-log?minutes=4320'),
                ]);
                if (transResp.ok) areaTranslations = await transResp.json();
                if (!alertResp.ok) return;

                const events = await alertResp.json();
                const container = document.getElementById('alert-list');
                document.getElementById('alert-count').textContent = `${events.length} events`;

                if (events.length === 0) {
                    container.innerHTML = '<div class="no-data">No alerts in last 3 days</div>';
                    return;
                }

                container.innerHTML = events.map(ev => {
                    const catColor = CATEGORY_COLORS[ev.category] || '#e94560';
                    let timeStr = '';
                    try {
                        const d = new Date(ev.ts);
                        const day = d.toLocaleDateString('en-GB', {
                            timeZone: 'Asia/Jerusalem', day: '2-digit', month: '2-digit',
                        });
                        const time = d.toLocaleTimeString('en-GB', {
                            timeZone: 'Asia/Jerusalem', hour12: false, hour: '2-digit', minute: '2-digit',
                        });
                        timeStr = `${day} ${time}`;
                    } catch { timeStr = ev.ts.substring(0, 16); }

                    return `<div class="alert-entry">
                        <span class="alert-entry-time">${timeStr}</span>
                        <span class="alert-entry-cat" style="background:${catColor}"></span>
                        <span class="alert-entry-area">${escapeHtml(translateArea(ev.area))}</span>
                        <span class="alert-entry-type">${escapeHtml(translateTitle(ev.title))}</span>
                    </div>`;
                }).join('');
            } catch (e) {
                console.error('Load alerts error:', e);
            }
        }

        // ── Load News ──
        async function loadNews() {
            try {
                const resp = await fetch('/api/news');
                if (!resp.ok) return;
                const articles = await resp.json();
                const container = document.getElementById('news-list');
                document.getElementById('news-count').textContent = `${articles.length} articles`;

                if (articles.length === 0) {
                    container.innerHTML = '<div class="no-data">No news available</div>';
                    return;
                }

                // Sort most recent first
                articles.sort((a, b) => {
                    const da = a.pubDate ? new Date(a.pubDate) : new Date(0);
                    const db = b.pubDate ? new Date(b.pubDate) : new Date(0);
                    return db - da;
                });

                container.innerHTML = articles.map(a => {
                    const srcClass = getSourceClass(a.source);
                    const srcLabel = getSourceLabel(a.source);
                    const timeAgo = relativeTime(a.pubDate);
                    return `<div class="news-entry">
                        <a href="${escapeHtml(a.link)}" target="_blank" rel="noopener">${escapeHtml(a.title)}</a>
                        <div class="news-meta">
                            ${srcLabel ? `<span class="news-source ${srcClass}">${escapeHtml(srcLabel)}</span>` : ''}
                            <span class="news-time">${escapeHtml(timeAgo)}</span>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                console.error('Load news error:', e);
            }
        }

        // ── Live Alert Flash ──
        async function pollLive() {
            try {
                const resp = await fetch('/api/alerts');
                if (!resp.ok) return;
                const alerts = await resp.json();
                const bar = document.getElementById('flash-bar');
                const text = document.getElementById('flash-bar-text');

                const active = alerts.filter(a => a.category !== 13 && a.category !== 14 && a.category < 15);
                if (active.length > 0) {
                    bar.classList.add('active');
                    const areas = active.map(a => translateArea(a.data)).join(' · ');
                    text.textContent = `${active.length} active: ${areas}`;
                } else {
                    bar.classList.remove('active');
                    text.textContent = 'No active alerts';
                }
            } catch {}
        }

        // ── Stream Toggle ──
        document.getElementById('stream-toggle').addEventListener('click', function() {
            const panel = document.getElementById('stream-panel');
            const label = document.getElementById('stream-label');
            if (panel.classList.contains('active')) {
                panel.classList.remove('active');
                panel.innerHTML = '';
                label.textContent = 'i24NEWS — play';
            } else {
                panel.classList.add('active');
                panel.innerHTML = '<iframe src="https://video.i24news.tv/live/brightcove/en" allow="autoplay; encrypted-media" allowfullscreen></iframe>';
                label.textContent = 'i24NEWS — stop';
            }
        });

        // ── Init ──
        async function init() {
            await Promise.all([loadAlerts(), loadNews()]);
            await pollLive();
            setInterval(pollLive, 15000);
            setInterval(loadNews, 600000);
        }

        init();
    </script>
</body>
</html>
