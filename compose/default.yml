# =============================================================================
# Red Alert Monitoring Stack — Docker Compose
# =============================================================================
# Uses pre-built images from Docker Hub by default.
# To build from source instead, uncomment the `build:` blocks and remove `image:`.
#
# Usage:
#   ./setup.sh                       # first-time setup
#   ./deploy.sh                      # redeploy
#   docker compose -f compose/default.yml up -d
#
# All services start by default. Enable/disable individual modules from the
# Management UI (/modules page) — disabled modules stay running but go dormant.
# =============================================================================

services:
  # ── Data Source ─────────────────────────────────────────────────────────────
  oref-proxy:
    image: danielrosehill/redalert-oref-proxy:latest
    # build:
    #   context: ../backend/oref-proxy
    #   dockerfile: Dockerfile
    container_name: oref-proxy
    restart: unless-stopped
    ports:
      - "${OREF_PROXY_PORT:-8764}:${OREF_PROXY_PORT:-8764}"
    environment:
      - PORT=${OREF_PROXY_PORT:-8764}
    networks:
      - redalert

  # ── Storage ─────────────────────────────────────────────────────────────────
  influxdb:
    image: influxdb:2
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-redalert-admin}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-redalert}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-alerts}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-redalert-dev-token}
    networks:
      - redalert

  # ── Frontend: Geodash Map Dashboard ─────────────────────────────────────────
  geodash:
    image: danielrosehill/redalert-geodash:latest
    # build:
    #   context: ../frontend/geodash
    #   dockerfile: Dockerfile
    container_name: geodash
    restart: unless-stopped
    ports:
      - "${GEODASH_PORT:-8083}:${GEODASH_PORT:-8083}"
    environment:
      - PORT=${GEODASH_PORT:-8083}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - INFLUX_URL=${INFLUXDB_URL:-http://influxdb:8086}
      - INFLUX_ORG=${INFLUXDB_ORG:-redalert}
      - INFLUX_BUCKET=${INFLUXDB_BUCKET:-alerts}
      - INFLUX_TOKEN=${INFLUXDB_TOKEN:-redalert-dev-token}
      - ALERT_AREA=${ALERT_AREA:-}
    depends_on:
      - oref-proxy
      - influxdb
    networks:
      - redalert

  # ── Frontend: Management UI ─────────────────────────────────────────────────
  management-ui:
    image: danielrosehill/redalert-management-ui:latest
    # build:
    #   context: ../frontend/management-ui
    #   dockerfile: Dockerfile
    container_name: management-ui
    restart: unless-stopped
    ports:
      - "${MANAGEMENT_UI_PORT:-8888}:3000"
    depends_on:
      - api
    networks:
      - redalert

  # ── Unified API ─────────────────────────────────────────────────────────────
  api:
    image: danielrosehill/redalert-api:latest
    # build:
    #   context: ../api
    #   dockerfile: Dockerfile
    container_name: red-alert-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-8890}:${API_PORT:-8890}"
    environment:
      - PORT=${API_PORT:-8890}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - GEODASH_URL=http://geodash:${GEODASH_PORT:-8083}
      - INFLUXDB_URL=http://influxdb:${INFLUXDB_PORT:-8086}
      - ACTUATOR_URL=http://actuator:${ACTUATOR_PORT:-8782}
      - PROMPT_RUNNER_URL=http://prompt-runner:${PROMPT_RUNNER_PORT:-8787}
      - TELEGRAM_BOT_URL=http://telegram-bot:${TELEGRAM_BOT_PORT:-8781}
      - MCP_SERVER_URL=http://mcp-server:${MCP_SERVER_PORT:-8786}
      - WEBHOOK_URL=http://webhook:${WEBHOOK_PORT:-8784}
      - SMS_RELAY_URL=http://sms-relay:${SMS_RELAY_PORT:-8792}
      - ALERT_AREA=${ALERT_AREA:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SITREP_EMAIL_FROM=${SITREP_EMAIL_FROM:-}
      - SITREP_EMAIL_TO=${SITREP_EMAIL_TO:-}
      - SITREP_SCHEDULE=${SITREP_SCHEDULE:-}
      - SITREP_DELIVER_TO=${SITREP_DELIVER_TO:-telegram}
      - PUSHOVER_API_TOKEN=${PUSHOVER_API_TOKEN:-}
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY:-}
      - GOOGLE_DRIVE_FOLDER_ID=${GOOGLE_DRIVE_FOLDER_ID:-}
      - GOOGLE_DRIVE_SITREP_FOLDER_ID=${GOOGLE_DRIVE_SITREP_FOLDER_ID:-}
      - GOOGLE_DRIVE_FORECAST_FOLDER_ID=${GOOGLE_DRIVE_FORECAST_FOLDER_ID:-}
      - GOOGLE_SERVICE_ACCOUNT_KEY=/app/secrets/service-account.json
      - SITREP_SAVE_DIR=/app/data/sitreps
      - SIMULATION_SAVE_DIR=/app/data/simulations
      - RSS_FEED_1_URL=${RSS_FEED_1_URL:-}
      - RSS_FEED_1_NAME=${RSS_FEED_1_NAME:-}
      - RSS_FEED_2_URL=${RSS_FEED_2_URL:-}
      - RSS_FEED_2_NAME=${RSS_FEED_2_NAME:-}
      - RSS_FEED_3_URL=${RSS_FEED_3_URL:-}
      - RSS_FEED_3_NAME=${RSS_FEED_3_NAME:-}
      - RSS_POLL_INTERVAL=${RSS_POLL_INTERVAL:-300}
    volumes:
      - api-data:/app/data
      - ${GOOGLE_SERVICE_ACCOUNT_KEY_PATH:-/dev/null}:/app/secrets/service-account.json:ro
    depends_on:
      - oref-proxy
    networks:
      - redalert

  # ── Backend: Notifications & OSINT ──────────────────────────────────────────
  osint-notifier:
    image: danielrosehill/redalert-osint-notifier:latest
    # build:
    #   context: ../backend/osint-notifier
    #   dockerfile: Dockerfile
    container_name: osint-notifier
    restart: unless-stopped
    environment:
      - PUSHOVER_APP_TOKEN=${PUSHOVER_API_TOKEN}
      - PUSHOVER_GROUP_KEY=${PUSHOVER_USER_KEY}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}/api/alerts
      - OREF_PROXY_BASE_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - OREF_ENABLED=${OREF_ENABLED:-true}
      - OREF_AREA_THRESHOLDS=${OREF_AREA_THRESHOLDS:-50,100,200,300,400,500,600,700,800,900,1000}
      - TELEGRAM_CHANNEL_EN=${TELEGRAM_CHANNEL_EN:-manniefabian}
      - TELEGRAM_CHANNEL_HE=${TELEGRAM_CHANNEL_HE:-news0404il}
      - TELEGRAM_POLL_INTERVAL=${TELEGRAM_POLL_INTERVAL:-15}
      - LOCATION_NAME=${LOCATION_NAME:-Jerusalem}
      - LOCAL_KEYWORDS_EN=${LOCAL_KEYWORDS_EN:-jerusalem,central israel}
      - LOCAL_KEYWORDS_HE=${LOCAL_KEYWORDS_HE:-ירושלים,מרכז הארץ}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - RSS_CACHE_URL=http://red-alert-api:${API_PORT:-8890}
      - RSS_FEEDS=${RSS_FEEDS:-https://www.timesofisrael.com/feed/,https://www.jns.org/feed/}
      - API_URL=http://red-alert-api:${API_PORT:-8890}
    depends_on:
      - oref-proxy
      - api
    networks:
      - redalert

  # ── Backend: Telegram Bot ────────────────────────────────────────────────────
  telegram-bot:
    image: danielrosehill/redalert-telegram-bot:latest
    # build:
    #   context: ../backend
    #   dockerfile: telegram-bot/Dockerfile
    container_name: telegram-bot
    restart: unless-stopped
    ports:
      - "${TELEGRAM_BOT_PORT:-8781}:${TELEGRAM_BOT_PORT:-8781}"
    environment:
      - PORT=${TELEGRAM_BOT_PORT:-8781}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - RSS_CACHE_URL=http://red-alert-api:${API_PORT:-8890}
      - ALERT_AREA=${ALERT_AREA:-}
      - ALLOWED_TELEGRAM_USERS=${ALLOWED_TELEGRAM_USERS:-}
      - SITREP_MODEL=${SITREP_MODEL:-}
      - CHAT_MODEL=${CHAT_MODEL:-}
      - TTS_MODEL=${TTS_MODEL:-}
    depends_on:
      - oref-proxy
      - api
    networks:
      - redalert

  # ── Backend: Home Assistant Bridge ──────────────────────────────────────────
  actuator:
    image: danielrosehill/redalert-actuator:latest
    # build:
    #   context: ../backend
    #   dockerfile: actuator/Dockerfile
    container_name: actuator
    restart: unless-stopped
    ports:
      - "${ACTUATOR_PORT:-8782}:${ACTUATOR_PORT:-8782}"
    environment:
      - PORT=${ACTUATOR_PORT:-8782}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - PROMPT_RUNNER_URL=http://prompt-runner:${PROMPT_RUNNER_PORT:-8787}
      - HASS_HOST=${HASS_HOST:-}
      - HASS_TOKEN=${HASS_TOKEN:-}
      - HASS_ENTITY=${HASS_ENTITY:-input_select.red_alert_state}
      - ALERT_AREA=${ALERT_AREA:-}
      - PROMPT_RUNNER_TRIGGER=${PROMPT_RUNNER_TRIGGER:-active}
      - PUSHOVER_API_TOKEN=${PUSHOVER_API_TOKEN:-}
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY:-}
      - API_URL=http://red-alert-api:${API_PORT:-8890}
    depends_on:
      - oref-proxy
    networks:
      - redalert

  # ── Backend: AI Prompt Runner ───────────────────────────────────────────────
  prompt-runner:
    image: danielrosehill/redalert-prompt-runner:latest
    # build:
    #   context: ../backend/prompt-runner
    #   dockerfile: Dockerfile
    container_name: prompt-runner
    restart: unless-stopped
    ports:
      - "${PROMPT_RUNNER_PORT:-8787}:${PROMPT_RUNNER_PORT:-8787}"
    environment:
      - PORT=${PROMPT_RUNNER_PORT:-8787}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_URL=http://telegram-bot:${TELEGRAM_BOT_PORT:-8781}
      - RSS_CACHE_URL=http://red-alert-api:${API_PORT:-8890}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - ALERT_AREA=${ALERT_AREA:-}
      - RESEND_API_KEY=${RESEND_API_KEY:-}
      - SITREP_EMAIL_FROM=${SITREP_EMAIL_FROM:-}
      - SITREP_EMAIL_TO=${SITREP_EMAIL_TO:-}
      - SITREP_SCHEDULE=${SITREP_SCHEDULE:-}
      - SITREP_DELIVER_TO=${SITREP_DELIVER_TO:-telegram}
    depends_on:
      - oref-proxy
    networks:
      - redalert

  # ── Backend: Snapcast TTS ────────────────────────────────────────────────────
  snapcast-tts:
    image: danielrosehill/redalert-snapcast-tts:latest
    # build:
    #   context: ../backend
    #   dockerfile: snapcast-tts/Dockerfile
    container_name: snapcast-tts
    restart: unless-stopped
    ports:
      - "${SNAPCAST_TTS_PORT:-8783}:${SNAPCAST_TTS_PORT:-8783}"
    environment:
      - PORT=${SNAPCAST_TTS_PORT:-8783}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - ALERT_AREA=${ALERT_AREA:-}
      - SNAPCAST_SERVER=${SNAPCAST_SERVER:-}
      - SNAPCAST_PORT=${SNAPCAST_PORT:-1780}
      - SNAPCAST_STREAM_PORT=${SNAPCAST_STREAM_PORT:-4953}
      - SNAPCAST_GROUP=${SNAPCAST_GROUP:-}
      - SNAPCAST_VOLUME=${SNAPCAST_VOLUME:-50}
      - TTS_VOICE=${TTS_VOICE:-en-US-GuyNeural}
      - TTS_ON_WARNING=${TTS_ON_WARNING:-true}
      - TTS_ON_ACTIVE=${TTS_ON_ACTIVE:-true}
      - TTS_ON_CLEAR=${TTS_ON_CLEAR:-true}
      - TTS_ON_THRESHOLD=${TTS_ON_THRESHOLD:-true}
      - API_URL=http://red-alert-api:${API_PORT:-8890}
    depends_on:
      - oref-proxy
    networks:
      - redalert

  # ── Backend: MCP Server ─────────────────────────────────────────────────────
  mcp-server:
    image: danielrosehill/redalert-mcp-server:latest
    # build:
    #   context: ../backend/mcp-server
    #   dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "${MCP_SERVER_PORT:-8786}:${MCP_SERVER_PORT:-8786}"
    environment:
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - RSS_CACHE_URL=http://red-alert-api:${API_PORT:-8890}
      - GEODASH_URL=http://geodash:${GEODASH_PORT:-8083}
      - ACTUATOR_URL=http://actuator:${ACTUATOR_PORT:-8782}
      - PROMPT_RUNNER_URL=http://prompt-runner:${PROMPT_RUNNER_PORT:-8787}
      - INFLUXDB_URL=${INFLUXDB_URL:-http://influxdb:8086}
      - ALERT_AREA=${ALERT_AREA:-}
    volumes:
      - mcp-data:/app/data
    depends_on:
      - oref-proxy
      - api
    networks:
      - redalert

  # ── Backend: Webhook Notifications ──────────────────────────────────────────
  webhook:
    image: danielrosehill/redalert-webhook:latest
    # build:
    #   context: ../backend
    #   dockerfile: webhook/Dockerfile
    container_name: webhook
    restart: unless-stopped
    ports:
      - "${WEBHOOK_PORT:-8784}:${WEBHOOK_PORT:-8784}"
    environment:
      - PORT=${WEBHOOK_PORT:-8784}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - ALERT_AREA=${ALERT_AREA:-}
      - WEBHOOK_URLS=${WEBHOOK_URLS:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - WEBHOOK_TIMEOUT=${WEBHOOK_TIMEOUT:-10}
      - API_URL=http://red-alert-api:${API_PORT:-8890}
    depends_on:
      - oref-proxy
    networks:
      - redalert

  # ── Backend: SMS Relay (Twilio) ─────────────────────────────────────────────
  sms-relay:
    image: danielrosehill/redalert-sms-relay:latest
    # build:
    #   context: ../backend
    #   dockerfile: sms-relay/Dockerfile
    container_name: sms-relay
    restart: unless-stopped
    ports:
      - "${SMS_RELAY_PORT:-8792}:${SMS_RELAY_PORT:-8792}"
    environment:
      - PORT=${SMS_RELAY_PORT:-8792}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - ALERT_AREA=${ALERT_AREA:-}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID:-}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN:-}
      - TWILIO_FROM_NUMBER=${TWILIO_FROM_NUMBER:-}
      - SMS_RECIPIENTS=${SMS_RECIPIENTS:-}
      - TWILIO_DELIVERY_MODE=${TWILIO_DELIVERY_MODE:-both}
      - TWILIO_VOICE_ON_CLEAR=${TWILIO_VOICE_ON_CLEAR:-true}
      - TWILIO_VOICE_MESSAGE=${TWILIO_VOICE_MESSAGE:-}
      - ESCALATION_ENABLED=${ESCALATION_ENABLED:-false}
      - API_URL=http://red-alert-api:${API_PORT:-8890}
    depends_on:
      - oref-proxy
    networks:
      - redalert

networks:
  redalert:
    name: redalert
    driver: bridge

volumes:
  influxdb-data:
    name: redalert-influxdb-data
  mcp-data:
    name: redalert-mcp-data
  api-data:
    name: redalert-api-data
