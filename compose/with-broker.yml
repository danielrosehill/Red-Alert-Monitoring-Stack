# =============================================================================
# Red Alert Monitoring Stack — With Bundled Mosquitto Broker
# =============================================================================
# Use this if you don't have a standalone MQTT broker on your network.
# Includes everything from default.yml plus a Mosquitto container.
#
# Usage:
#   cp .env.example .env   # fill in your values
#   docker compose -f compose/with-broker.yml up -d --build
# =============================================================================

services:
  # -- Data Source -------------------------------------------------------------
  oref-proxy:
    build:
      context: ../oref-proxy
      dockerfile: Dockerfile
    container_name: oref-proxy
    restart: unless-stopped
    ports:
      - "${OREF_PROXY_PORT:-8764}:${OREF_PROXY_PORT:-8764}"
    environment:
      - PORT=${OREF_PROXY_PORT:-8764}
    networks:
      - redalert

  # -- Storage -----------------------------------------------------------------
  influxdb:
    image: influxdb:2
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "${INFLUXDB_PORT:-8086}:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=${INFLUXDB_ADMIN_USER:-admin}
      - DOCKER_INFLUXDB_INIT_PASSWORD=${INFLUXDB_ADMIN_PASSWORD:-redalert-admin}
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-redalert}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-alerts}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-redalert-dev-token}
    networks:
      - redalert

  # -- MQTT Broker (bundled) ---------------------------------------------------
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "${MQTT_EXTERNAL_PORT:-1883}:1883"
      - "9001:9001"
    volumes:
      - ../mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto-data:/mosquitto/data
      - mosquitto-log:/mosquitto/log
    networks:
      - redalert

  # -- Dashboard ---------------------------------------------------------------
  geodash:
    build:
      context: ../geodash
      dockerfile: Dockerfile
    container_name: geodash
    restart: unless-stopped
    ports:
      - "${GEODASH_PORT:-8083}:${GEODASH_PORT:-8083}"
    environment:
      - PORT=${GEODASH_PORT:-8083}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - INFLUX_URL=${INFLUXDB_URL:-http://influxdb:8086}
      - INFLUX_ORG=${INFLUXDB_ORG:-redalert}
      - INFLUX_BUCKET=${INFLUXDB_BUCKET:-alerts}
      - INFLUX_TOKEN=${INFLUXDB_TOKEN:-redalert-dev-token}
      - ALERT_AREA=${ALERT_AREA:-}
    depends_on:
      - oref-proxy
      - influxdb
    networks:
      - redalert

  # -- Notifications -----------------------------------------------------------
  pushover:
    build:
      context: ../pushover
      dockerfile: Dockerfile
    container_name: pushover
    restart: unless-stopped
    environment:
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}/api/alerts
      - PUSHOVER_API_TOKEN=${PUSHOVER_API_TOKEN}
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY}
      - ALERT_AREA=${ALERT_AREA:-}
    depends_on:
      - oref-proxy
    networks:
      - redalert

  telegram-bot:
    build:
      context: ../telegram-bot
      dockerfile: Dockerfile
    container_name: telegram-bot
    restart: unless-stopped
    ports:
      - "${TELEGRAM_BOT_PORT:-8781}:${TELEGRAM_BOT_PORT:-8781}"
    environment:
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ALERT_AREA=${ALERT_AREA:-}
    volumes:
      - telegram-data:/app/data
    depends_on:
      - oref-proxy
    networks:
      - redalert

  # -- Automation --------------------------------------------------------------
  actuator:
    build:
      context: ../actuator
      dockerfile: Dockerfile
    container_name: actuator
    restart: unless-stopped
    ports:
      - "${ACTUATOR_PORT:-8782}:${ACTUATOR_PORT:-8782}"
    environment:
      - PORT=${ACTUATOR_PORT:-8782}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - PROMPT_RUNNER_URL=http://prompt-runner:${PROMPT_RUNNER_PORT:-8787}
      - MQTT_BROKER=mosquitto
      - MQTT_PORT=1883
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - MQTT_LIGHT_TOPICS=${MQTT_LIGHT_TOPICS:-}
      - MQTT_ALARM_TOPICS=${MQTT_ALARM_TOPICS:-}
      - ALERT_AREA=${ALERT_AREA:-}
      - TTS_ENABLED=${TTS_ENABLED:-true}
      - TTS_COOLDOWN=${TTS_COOLDOWN:-60}
      - LIGHT_RESTORE_AFTER=${LIGHT_RESTORE_AFTER:-120}
    volumes:
      - ${SNAPCAST_FIFO:-/tmp/snapfifo}:/tmp/snapfifo
    depends_on:
      - oref-proxy
      - mosquitto
    networks:
      - redalert

  # -- AI Prompt Runner --------------------------------------------------------
  prompt-runner:
    build:
      context: ../prompt-runner
      dockerfile: Dockerfile
    container_name: prompt-runner
    restart: unless-stopped
    ports:
      - "${PROMPT_RUNNER_PORT:-8787}:${PROMPT_RUNNER_PORT:-8787}"
    environment:
      - PORT=${PROMPT_RUNNER_PORT:-8787}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - TELEGRAM_BOT_URL=http://telegram-bot:${TELEGRAM_BOT_PORT:-8781}
      - RSS_CACHE_URL=http://rss-cache:${RSS_CACHE_PORT:-8785}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - ALERT_AREA=${ALERT_AREA:-}
    depends_on:
      - oref-proxy
      - rss-cache
    networks:
      - redalert

  # -- Caching -----------------------------------------------------------------
  rss-cache:
    build:
      context: ../rss-cache
      dockerfile: Dockerfile
    container_name: rss-cache
    restart: unless-stopped
    ports:
      - "${RSS_CACHE_PORT:-8785}:${RSS_CACHE_PORT:-8785}"
    environment:
      - PORT=${RSS_CACHE_PORT:-8785}
      - RSS_FEED_1_URL=${RSS_FEED_1_URL:-}
      - RSS_FEED_1_NAME=${RSS_FEED_1_NAME:-}
      - RSS_FEED_2_URL=${RSS_FEED_2_URL:-}
      - RSS_FEED_2_NAME=${RSS_FEED_2_NAME:-}
      - RSS_FEED_3_URL=${RSS_FEED_3_URL:-}
      - RSS_FEED_3_NAME=${RSS_FEED_3_NAME:-}
      - RSS_POLL_INTERVAL=${RSS_POLL_INTERVAL:-300}
    networks:
      - redalert

  # -- MCP Server --------------------------------------------------------------
  mcp-server:
    build:
      context: ../mcp-server
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "${MCP_SERVER_PORT:-8786}:${MCP_SERVER_PORT:-8786}"
    environment:
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - RSS_CACHE_URL=http://rss-cache:${RSS_CACHE_PORT:-8785}
      - ALERT_AREA=${ALERT_AREA:-}
    volumes:
      - mcp-data:/app/data
    depends_on:
      - oref-proxy
      - rss-cache
    networks:
      - redalert

  # -- Management --------------------------------------------------------------
  management-ui:
    build:
      context: ../management-ui
      dockerfile: Dockerfile
    container_name: management-ui
    restart: unless-stopped
    ports:
      - "${MANAGEMENT_UI_PORT:-8888}:${MANAGEMENT_UI_PORT:-8888}"
    environment:
      - PORT=${MANAGEMENT_UI_PORT:-8888}
      - STACK_NAME=${STACK_NAME:-Red Alert Monitoring Stack}
      - OREF_PROXY_URL=http://oref-proxy:${OREF_PROXY_PORT:-8764}
      - GEODASH_URL=http://geodash:${GEODASH_PORT:-8083}
      - INFLUXDB_URL=http://influxdb:${INFLUXDB_PORT:-8086}
      - ACTUATOR_URL=http://actuator:${ACTUATOR_PORT:-8782}
      - PROMPT_RUNNER_URL=http://prompt-runner:${PROMPT_RUNNER_PORT:-8787}
      - GEODASH_EXTERNAL_URL=${GEODASH_EXTERNAL_URL:-http://localhost:${GEODASH_PORT:-8083}}
      - MQTT_BROKER=mosquitto
      - ALERT_AREA=${ALERT_AREA:-}
      - SNAPCAST_SERVER=${SNAPCAST_SERVER:-}
      - SNAPCAST_PORT=${SNAPCAST_PORT:-1780}
    depends_on:
      - oref-proxy
    networks:
      - redalert

networks:
  redalert:
    name: redalert
    driver: bridge

volumes:
  influxdb-data:
  mcp-data:
  telegram-data:
  mosquitto-data:
  mosquitto-log:
