# =============================================================================
# Red Alert Monitoring Stack — Docker Compose Override (Example)
# =============================================================================
# Copy this file to override.yml to customize the stack without modifying
# the base compose files. Use with: docker compose -f compose/default.yml -f compose/override.yml
#
#   cp compose/override.example.yml compose/override.yml
#
# Common customizations are shown below. Uncomment and modify as needed.
# =============================================================================

services:
  # -- Expose additional ports -------------------------------------------------
  # influxdb:
  #   ports:
  #     - "8086:8086"   # Already exposed by default

  # -- Add Cloudflare Tunnel for remote access ---------------------------------
  # cloudflared:
  #   image: cloudflare/cloudflared:latest
  #   container_name: cloudflared
  #   restart: unless-stopped
  #   command: tunnel run
  #   volumes:
  #     - ../cloudflared:/etc/cloudflared:ro
  #   networks:
  #     - redalert

  # -- Override actuator settings (e.g., custom poll interval) -----------------
  # actuator:
  #   environment:
  #     - POLL_INTERVAL=5
  #     - LIGHT_RESTORE_AFTER=300
  #     - TTS_COOLDOWN=120

  # -- Add extra MQTT topics at deploy time ------------------------------------
  # actuator:
  #   environment:
  #     - MQTT_LIGHT_TOPICS=zigbee2mqtt/living_room/set,zigbee2mqtt/hallway/set,zigbee2mqtt/bedroom/set

  # -- Mount custom Mosquitto config (for with-broker variant) -----------------
  # mosquitto:
  #   volumes:
  #     - ../mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
  #     - ../mosquitto/passwd:/mosquitto/config/passwd:ro

  # -- Add a Grafana dashboard for InfluxDB visualization ----------------------
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: grafana
  #   restart: unless-stopped
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - GF_SECURITY_ADMIN_PASSWORD=admin
  #   volumes:
  #     - grafana-data:/var/lib/grafana
  #   networks:
  #     - redalert

  # -- Override RSS feeds (use numbered env vars) ---------------------------------
  # rss-cache:
  #   environment:
  #     - RSS_FEED_1_URL=https://www.timesofisrael.com/feed/
  #     - RSS_FEED_1_NAME=Times of Israel
  #     - RSS_FEED_2_URL=https://www.jns.org/feed/
  #     - RSS_FEED_2_NAME=JNS
  #     - RSS_FEED_3_URL=https://www.ynetnews.com/rss/news
  #     - RSS_FEED_3_NAME=Ynet
  #     - RSS_POLL_INTERVAL=120

  # -- Resource limits ---------------------------------------------------------
  # actuator:
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 256M
  #         cpus: '0.5'

# -- Extra volumes (uncomment if adding services above) ----------------------
# volumes:
#   grafana-data:
