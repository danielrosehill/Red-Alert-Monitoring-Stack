version: "3.8"

services:
  # ── Data Layer ──────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-redalert}
      POSTGRES_USER: ${POSTGRES_USER:-redalert}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    ports:
      - "5432:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-redalert}"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Core Services ───────────────────────────────────────────
  alert-ingester:
    build: ./services/alert-ingester
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-redalert}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-redalert}
      PIKUD_HAOREF_URL: ${PIKUD_HAOREF_URL:-https://www.oref.org.il/WarningMessages/alert/alerts.json}
      POLL_INTERVAL_MS: ${POLL_INTERVAL_MS:-3000}
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  alert-api:
    build: ./services/alert-api
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      DATABASE_URL: postgresql://${POSTGRES_USER:-redalert}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-redalert}
      PORT: 3001
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy

  dashboard:
    build: ./services/dashboard
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://alert-api:3001
      NEXT_PUBLIC_WS_URL: ws://alert-api:3001
      PORT: 3000
    depends_on:
      - alert-api

  home-automation:
    build: ./services/home-automation
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      HOME_ASSISTANT_URL: ${HOME_ASSISTANT_URL:-http://homeassistant.local:8123}
      HOME_ASSISTANT_TOKEN: ${HOME_ASSISTANT_TOKEN:-}
      MQTT_BROKER_URL: ${MQTT_BROKER_URL:-}
    depends_on:
      redis:
        condition: service_healthy

  notification-service:
    build: ./services/notification-service
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NTFY_SERVER: ${NTFY_SERVER:-https://ntfy.sh}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      PUSHOVER_USER_KEY: ${PUSHOVER_USER_KEY:-}
      PUSHOVER_APP_TOKEN: ${PUSHOVER_APP_TOKEN:-}
    depends_on:
      redis:
        condition: service_healthy

  # ── Reverse Proxy ───────────────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dashboard
      - alert-api

volumes:
  redis-data:
  pg-data:
