# =============================================================================
# Red Alert Monitoring Stack — Core Docker Compose
# =============================================================================
# Assumes you have a Mosquitto MQTT broker running separately on your network.
# If you need a bundled broker, use docker-compose.with-broker.yml instead.
#
# Usage:
#   cp .env.example .env   # fill in your values
#   docker compose up -d
# =============================================================================

services:
  # -- Data Source -------------------------------------------------------------
  oref-proxy:
    image: danielrosehill/red-alert-proxy:latest
    container_name: oref-proxy
    restart: unless-stopped
    ports:
      - "8764:8764"
    networks:
      - redalert

  # -- Storage -----------------------------------------------------------------
  influxdb:
    image: influxdb:2
    container_name: influxdb
    restart: unless-stopped
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb2
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_INIT_USERNAME=admin
      - DOCKER_INFLUXDB_INIT_PASSWORD=redalert-admin
      - DOCKER_INFLUXDB_INIT_ORG=${INFLUXDB_ORG:-redalert}
      - DOCKER_INFLUXDB_INIT_BUCKET=${INFLUXDB_BUCKET:-alerts}
      - DOCKER_INFLUXDB_INIT_ADMIN_TOKEN=${INFLUXDB_TOKEN:-redalert-dev-token}
    networks:
      - redalert

  # -- Dashboard ---------------------------------------------------------------
  geodash:
    image: danielrosehill/red-alert-geodash:latest
    container_name: geodash
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      - OREF_PROXY_URL=${OREF_PROXY_URL:-http://oref-proxy:8764}
      - INFLUXDB_URL=${INFLUXDB_URL:-http://influxdb:8086}
      - INFLUXDB_ORG=${INFLUXDB_ORG:-redalert}
      - INFLUXDB_BUCKET=${INFLUXDB_BUCKET:-alerts}
      - INFLUXDB_TOKEN=${INFLUXDB_TOKEN:-redalert-dev-token}
      - ALERT_AREA=${ALERT_AREA:-}
    depends_on:
      - oref-proxy
      - influxdb
    networks:
      - redalert

  # -- Notifications -----------------------------------------------------------
  pushover:
    image: danielrosehill/red-alert-pushover:latest
    container_name: pushover
    restart: unless-stopped
    environment:
      - OREF_PROXY_URL=${OREF_PROXY_URL:-http://oref-proxy:8764}
      - PUSHOVER_API_TOKEN=${PUSHOVER_API_TOKEN}
      - PUSHOVER_USER_KEY=${PUSHOVER_USER_KEY}
      - ALERT_AREA=${ALERT_AREA:-}
    depends_on:
      - oref-proxy
    networks:
      - redalert

  telegram-bot:
    image: danielrosehill/red-alert-telegram:latest
    container_name: telegram-bot
    restart: unless-stopped
    environment:
      - OREF_PROXY_URL=${OREF_PROXY_URL:-http://oref-proxy:8764}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ALERT_AREA=${ALERT_AREA:-}
    depends_on:
      - oref-proxy
    networks:
      - redalert

  # -- Automation --------------------------------------------------------------
  actuator:
    build:
      context: ./actuator
      dockerfile: Dockerfile
    container_name: actuator
    restart: unless-stopped
    environment:
      - OREF_PROXY_URL=${OREF_PROXY_URL:-http://oref-proxy:8764}
      - MQTT_BROKER=${MQTT_BROKER:?Set MQTT_BROKER to your broker IP e.g. 10.0.0.4}
      - MQTT_PORT=${MQTT_PORT:-1883}
      - MQTT_USERNAME=${MQTT_USERNAME:-}
      - MQTT_PASSWORD=${MQTT_PASSWORD:-}
      - MQTT_LIGHT_TOPICS=${MQTT_LIGHT_TOPICS:-}
      - ALERT_AREA=${ALERT_AREA:-}
      - TTS_ENABLED=${TTS_ENABLED:-true}
      - TTS_COOLDOWN=${TTS_COOLDOWN:-60}
      - LIGHT_RESTORE_AFTER=${LIGHT_RESTORE_AFTER:-120}
    volumes:
      - ${SNAPCAST_FIFO:-/tmp/snapfifo}:/tmp/snapfifo
    depends_on:
      - oref-proxy
    networks:
      - redalert

  # -- Caching -----------------------------------------------------------------
  rss-cache:
    image: danielrosehill/red-alert-rss-cache:latest
    build:
      context: ./rss-cache
      dockerfile: Dockerfile
    container_name: rss-cache
    restart: unless-stopped
    ports:
      - "8785:8785"
    environment:
      - RSS_FEEDS=${RSS_FEEDS:-https://www.timesofisrael.com/feed/|Times of Israel,https://www.jns.org/feed/|JNS}
      - RSS_POLL_INTERVAL=${RSS_POLL_INTERVAL:-300}
    networks:
      - redalert

  # -- MCP Server --------------------------------------------------------------
  mcp-server:
    image: danielrosehill/red-alert-mcp:latest
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "8786:8786"
    environment:
      - OREF_PROXY_URL=http://oref-proxy:8764
      - RSS_CACHE_URL=http://rss-cache:8785
      - ALERT_AREA=${ALERT_AREA:-}
    volumes:
      - mcp-data:/app/data
    depends_on:
      - oref-proxy
      - rss-cache
    networks:
      - redalert

  # -- Management --------------------------------------------------------------
  management-ui:
    image: danielrosehill/red-alert-management:latest
    build:
      context: ./management-ui
      dockerfile: Dockerfile
    container_name: management-ui
    restart: unless-stopped
    ports:
      - "8888:8888"
    environment:
      - STACK_NAME=${STACK_NAME:-Red Alert Monitoring Stack}
      - OREF_PROXY_URL=http://oref-proxy:8764
      - GEODASH_URL=http://geodash:8083
      - INFLUXDB_URL=http://influxdb:8086
      - GEODASH_EXTERNAL_URL=${GEODASH_EXTERNAL_URL:-http://localhost:8083}
      - MQTT_BROKER=${MQTT_BROKER:?Set MQTT_BROKER to your broker IP e.g. 10.0.0.4}
      - ALERT_AREA=${ALERT_AREA:-}
    depends_on:
      - oref-proxy
    networks:
      - redalert

networks:
  redalert:
    name: redalert
    driver: bridge

volumes:
  influxdb-data:
  mcp-data:
